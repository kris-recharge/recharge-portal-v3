version: "3.9"

# ReCharge Alaska Portal v3
# Caddy runs on the VPS host (not in Docker), so:
#   - API is exposed on host port 8001 (Caddy reverse-proxies to localhost:8001)
#   - Frontend dist is extracted from rca_web_v3 to /srv/app on the host,
#     then served directly by host Caddy as static files.

services:

  rca_api_v3:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: rca_api_v3
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8001:8000"   # host Caddy proxies to localhost:8001
    networks:
      - rca_net_v3

  rca_web_v3:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        VITE_API_BASE: ""         # empty = relative URLs; Caddy serves both frontend + API
    env_file: .env                # makes .env vars available for the args substitution above
    container_name: rca_web_v3
    restart: "no"               # build artifact only — run once to extract dist
    networks:
      - rca_net_v3

networks:
  rca_net_v3:
    driver: bridge
